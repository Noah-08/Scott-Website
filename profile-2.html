<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile 2</title>

<style>

/* Reset */
body{
    margin:0;
    background:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
}

/* Shared nav button style */
.nav-btn{
    position:fixed;
    top:20px;
    z-index:10;
    text-decoration:none;
    font-size:15px;
    font-weight:600;
    color:#111;
    padding:10px 16px;
    border-radius:14px;

    /* Glass UI */
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    /* Depth */
    box-shadow:0 6px 18px rgba(0,0,0,0.12);

    /* Smooth interaction */
    transition:all 0.2s ease;
}

/* Positions */
.back{
    left:20px;
}

.next{
    right:20px;
}

/* Hover / tap */
.nav-btn:hover{
    background:rgba(255,255,255,0.85);
}

.nav-btn:active{
    transform:scale(0.94);
}

/* Container */
.container{
    width:100%;
    margin:0;
    padding:0;
}

/* Image */
.main-image{
    width:100%;
    height:auto;
    display:block;
}

/* Mobile scroll feel */
@media (max-width: 768px){
    .main-image{
        width:140%;
        margin-left:-20%;
    }
}

</style>

</head>

<body>

<a class="nav-btn" href="profile.html">← Previous</a>

<div class="container">
    <img class="main-image" src="Images/PROFILE 2.PNG" alt="Profile 2">
</div>

</body>
</html>
