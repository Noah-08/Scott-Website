<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Design</title>

<style>

/* Reset */
body{
    margin:0;
    background:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
}

/* Back button */
.back{
    position:fixed;
    top:20px;
    left:20px;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
    color:#a1005a;
    z-index:10;
    background:rgba(255,255,255,0.7);
    padding:6px 10px;
    border-radius:6px;
}

/* Container */
.container{
    width:100%;
    margin:0;
    padding:0;
}

/* Image fits width, keeps full height */
.main-image{
    width:100%;
    height:auto;
    display:block;
}

</style>

</head>

<body>

<a class="back" href="index.html">← Back</a>

<div class="container">

<img class="main-image" src="" alt="photographic videography">

</div>

</body>
</html>
